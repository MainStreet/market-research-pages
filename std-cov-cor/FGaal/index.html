<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FGaal — Portfolio Risk Reports</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
         "Helvetica Neue", Arial, sans-serif;
         background: #f4f6f9; color: #1a2b4a; line-height: 1.5;
         font-size: 13px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px 40px; }
  header { background: #1a2b4a; color: #fff; padding: 20px 24px;
           margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 600; margin: 0; }
  header .subtitle { color: #a0b4d0; font-size: 12px; margin-top: 4px; }
  h2 { color: #1a2b4a; font-size: 15px; margin: 28px 0 10px;
       border-bottom: 2px solid #2e5c9a; padding-bottom: 4px; }
  table { border-collapse: collapse; width: 100%; margin: 12px 0 20px;
          font-size: 12px; }
  th { background: #2e5c9a; color: #fff; padding: 7px 10px;
       text-align: left; font-size: 11px; text-transform: uppercase;
       letter-spacing: 0.5px; }
  td { padding: 6px 10px; border-bottom: 1px solid #dde3ec; }
  tr:nth-child(even) { background: #f0f3f8; }
  tr:hover { background: #e4eaf4; }
  .text-muted { color: #6b7a8d; font-size: 11px; }
  a { color: #2e5c9a; text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer { margin-top: 32px; padding-top: 12px;
           border-top: 1px solid #dde3ec; color: #6b7a8d;
           font-size: 11px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>FGaal — Portfolio Risk Reports</h1>
  <div class='subtitle'>std-cov-cor — Market Research Skills</div>
</header>
<div class="container">
<main>
<h2>FGaal Reports</h2>
<p class="text-muted" id="count">Loading...</p>
<table>
<thead><tr><th>Report</th><th>Date</th></tr></thead>
<tbody id="report-list">
  <tr><td colspan="2">Loading reports...</td></tr>
</tbody>
</table>
<p><a href="../index.html">&larr; Back to std-cov-cor</a></p>
</main>
<footer>Market Research Skills — GitHub Pages</footer>
</div>

<script>
  const OWNER = 'MainStreet';
  const REPO  = 'market-research-pages';
  const PATH  = 'std-cov-cor/FGaal';

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`)
    .then(r => r.json())
    .then(files => {
      const reports = files
        .filter(f => f.name !== 'index.html' && f.name.endsWith('.html'))
        .sort((a, b) => b.name.localeCompare(a.name)); // newest first

      document.getElementById('count').textContent =
        reports.length + ' report' + (reports.length !== 1 ? 's' : '') + ' available';

      const tbody = document.getElementById('report-list');
      tbody.innerHTML = reports.map(f => {
        const label = f.name.replace('Portfolio_Risk_', '').replace('.html', '').replace(/-/g, ' ');
        return `<tr><td><a href="${f.name}">${label}</a></td><td>${f.name.match(/\d{4}-\d{2}-\d{2}/) ? f.name.match(/(\d{4})-(\d{2})-(\d{2})/).slice(1).join('-') : ''}</td></tr>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('report-list').innerHTML =
        '<tr><td colspan="2">Could not load reports.</td></tr>';
    });
</script>
</body>
</html>
